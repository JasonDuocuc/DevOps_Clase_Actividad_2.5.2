name: CI/CD Tienda Perritos - Frontend

on:
  push:
    branches: [ "main" ]
    paths:
      - "frontend/**"

jobs:
  build-push-deploy-frontend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login en Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build & Push imagen Frontend a ECR
      env:
        # Armamos la URL completa del repositorio para evitar que use docker.io
        REGISTRY: ${{ secrets.ECR_REGISTRY }}
        REPO_NAME: ${{ secrets.ECR_REPO_URL_FRONTEND }}
      run: |
        cd frontend
        # 1. Construir la imagen con el tag de AWS directamente
        docker build -t $REGISTRY/$REPO_NAME:latest .
        
        # 2. Hacer el push (ahora sabe que es para ECR)
        docker push $REGISTRY/$REPO_NAME:latest

    - name: Desplegar Frontend en EC2 vía SSM
      run: |
        aws ssm send-command \
          --instance-ids "${{ secrets.EC2_FRONTEND_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --comment "Actualizar tienda-frontend desde ECR" \
          --parameters commands='[
            "set -e",
            "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
            "docker pull ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO_URL_FRONTEND }}:latest",
            "docker stop tienda-frontend || true",
            "docker rm tienda-frontend || true",
            "docker run -d --name tienda-frontend -p 80:80 ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO_URL_FRONTEND }}:latest"
          ]' \
          --region "${{ secrets.AWS_REGION }}"
